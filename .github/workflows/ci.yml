name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check DVC
        run: dvc --version

      - name: Configure DVC remote
        env:
          DVC_REMOTE_URL: ${{ secrets.DVC_REMOTE_URL }}
          DVC_ENDPOINT_URL: ${{ secrets.DVC_ENDPOINT_URL }}
          DVC_ACCESS_KEY_ID: ${{ secrets.DVC_ACCESS_KEY_ID }}
          DVC_SECRET_ACCESS_KEY: ${{ secrets.DVC_SECRET_ACCESS_KEY }}
        run: |
          if [ -z "$DVC_REMOTE_URL" ]; then
            echo "Missing DVC_REMOTE_URL secret. CI cannot pull DVC data."
            exit 1
          fi
          dvc remote add -d ci-remote "$DVC_REMOTE_URL" --force
          if [ -n "$DVC_ENDPOINT_URL" ]; then
            dvc remote modify ci-remote endpointurl "$DVC_ENDPOINT_URL"
          fi
          if [ -n "$DVC_ACCESS_KEY_ID" ]; then
            dvc remote modify --local ci-remote access_key_id "$DVC_ACCESS_KEY_ID"
          fi
          if [ -n "$DVC_SECRET_ACCESS_KEY" ]; then
            dvc remote modify --local ci-remote secret_access_key "$DVC_SECRET_ACCESS_KEY"
          fi

      - name: Pull DVC data
        run: dvc pull

      - name: Reproduce pipeline
        run: dvc repro

      - name: Build Docker image
        run: docker build -t student-api .
